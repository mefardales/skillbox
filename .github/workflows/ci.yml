name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate all SKILL.md files
        run: cd scripts && npx tsx validate-skills.ts

  build-registry:
    name: Build Registry
    runs-on: ubuntu-latest
    needs: validate-skills
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build registry.json
        run: cd scripts && npx tsx build-registry.ts

      - name: Upload registry artifact
        uses: actions/upload-artifact@v4
        with:
          name: registry
          path: skills/registry.json

  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    needs: validate-skills
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CLI dependencies
        run: cd cli && npm ci

      - name: Build CLI
        run: cd cli && npm run build

  build-extension:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: validate-skills
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Extension dependencies
        run: cd extension && npm ci

      - name: Build Extension
        run: cd extension && npm run build

  commit-registry:
    name: Commit Updated Registry
    runs-on: ubuntu-latest
    needs: [build-registry, build-cli]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build registry.json
        run: cd scripts && npx tsx build-registry.ts

      - name: Check for registry changes
        id: check-changes
        run: |
          git diff --quiet skills/registry.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push registry.json
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/registry.json
          git commit -m "chore: update skills registry.json [skip ci]"
          git push

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-registry]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
